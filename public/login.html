<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Life Control Center</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: grid; place-items: center; }
    .login-box { width: 100%; max-width: 400px; padding: 40px; text-align: center; }
    .login-box h1 { font-size: 32px; margin-bottom: 24px; background: none; -webkit-text-fill-color: var(--text); }
    .login-box input { margin-bottom: 16px; text-align: center; font-size: 18px; }
    .login-box button { width: 100%; padding: 14px; font-size: 16px; }
    .error { color: var(--red); font-size: 14px; margin-top: 16px; display: none; }
  </style>
</head>
<body>
  <div class="login-box glass">
    <div class="brand" style="justify-content: center; margin-bottom: 16px;"><span class="orb"></span><span>Life Control Center</span></div>
    <h1>Authentication</h1>
    <form id="loginForm">
      <input type="password" id="password" placeholder="Enter password" required autofocus>
      <button type="submit" class="primary">Access System</button>
      <div class="error" id="errorMsg">Invalid password</div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password })
      });
      const data = await res.json();
      if (data.success) {
        window.location.href = '/';
      } else {
        document.getElementById('errorMsg').style.display = 'block';
        document.getElementById('password').value = '';
      }
    };
  </script>
</body>
</html>
