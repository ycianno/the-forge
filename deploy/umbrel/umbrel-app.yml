manifestVersion: 1
id: the-forge
category: productivity
name: The Forge
version: "1.1.0"
tagline: Turn your real life into an RPG
description: >-
  The Forge is a self-hosted, single-user habit tracker that gamifies your
  goals — XP, levels, five life attributes, daily quests, streaks, badges, a
  weekly boss, and a focus timer. No accounts, no cloud, no tracking: all of
  your data lives in one SQLite file on your Umbrel.


  It includes a shareable character card, a trophy Cabinet, 10 themes,
  analytics, an installable PWA with push reminders, and an optional local-AI
  Discord companion (via Ollama).
releaseNotes: >-
  v1.1.0 — Trophy Cabinet, shareable character card, sample-data onboarding,
  the Initiate→Forgemaster rank ladder, login hardening, and self-hosted fonts
  (fully offline).
