services:
  life-control-center:
    build: .
    container_name: life-control-center
    ports:
      - "3007:3007"
    volumes:
      - ./data:/app/data
      - ./public:/app/public
    restart: unless-stopped
    environment:
      - PORT=3007
      - APP_PASSWORD=changeme
      - DB_PATH=/app/data/database.sqlite
